name: Android Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      # =========================
      # 🔐 解密 keystore（关键）
      # =========================
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > key.jks

      # =========================
      # 🔧 构建 Release APK
      # =========================
      - name: 构建 Release 包
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # =========================
      # 📦 上传构建产物
      # =========================
      - name: 上传 APK 到构建产物
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk


  # =========================
  # 🚀 创建 GitHub Release
  # =========================
  create_release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 下载构建好的 APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./apk

      # =========================
      # 🆕 动态生成 update.json
      # =========================
      - name: 生成 update.json
        run: |
          # 获取 APK 文件名
          APK_NAME=$(ls ./apk/*.apk | xargs -n 1 basename)
          
          # 去除 tag 前面的 'v'，例如 v1.0.0 -> 1.0.0
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          
          # 生成 JSON 文件
          cat > ./apk/update.json << EOF
          {
            "versionName": "${VERSION_NAME}",
            "versionCode": ${GITHUB_RUN_NUMBER},
            "updateLog": $(echo "${{ github.event.head_commit.message }}" | jq -Rs .),
            "downloadUrl": "https://github.com/${{ github.repository }}/releases/latest/download/${APK_NAME}"
          }
          EOF
          
          # 打印验证生成结果
          echo "✅ 生成的 update.json 内容如下："
          cat ./apk/update.json

      # =========================
      # 📤 创建 Release 并上传附件
      # =========================
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: Android 自动构建版本 ${{ github.ref_name }}
          body: |
            ✅ 自动构建成功
            📅 构建时间：${{ github.event.head_commit.timestamp }}
            📝 提交信息：${{ github.event.head_commit.message }}
          # 同时上传 APK 和 JSON
          files: |
            ./apk/*.apk
            ./apk/update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
